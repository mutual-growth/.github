name: リファクタリング提案
description: コード品質の改善を提案する
labels: ["リファクタリング"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 問題のある箇所
      description: どこが・なぜ問題か
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 改善案
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 対象パッケージ
      options:
        - 対象: dataflow
        - 対象: widget
        - 対象: scene
        - 対象: editor
        - 対象: datatype
        - 対象: graph-canvas
        - 横断的
